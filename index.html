<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIDI Bullet Symphony</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }
    #app { width: 100%; height: 100%; position: relative; }

    /* Upload Screen */
    #upload-screen {
      position: absolute; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, #1a1a3e 0%, #0a0a12 70%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0ff;
      transition: opacity 0.8s ease;
    }
    #upload-screen.hidden { opacity: 0; pointer-events: none; }

    #upload-screen h1 {
      font-size: 3.5rem; font-weight: 200; letter-spacing: 0.3em; text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite alternate;
    }
    @keyframes shimmer {
      0% { filter: brightness(0.8); } 100% { filter: brightness(1.3); }
    }

    #upload-screen .subtitle {
      font-size: 1rem; font-weight: 300; letter-spacing: 0.15em; color: #8888bb;
      margin-bottom: 3rem;
    }

    .upload-zone {
      width: 420px; height: 220px;
      border: 2px dashed rgba(167, 139, 250, 0.3);
      border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(167, 139, 250, 0.03);
      position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: rgba(167, 139, 250, 0.7);
      background: rgba(167, 139, 250, 0.08);
      box-shadow: 0 0 40px rgba(167, 139, 250, 0.1);
    }
    .upload-zone svg { width: 48px; height: 48px; stroke: #a78bfa; margin-bottom: 1rem; opacity: 0.7; }
    .upload-zone p { font-size: 0.95rem; color: #8888bb; }
    .upload-zone .format { font-size: 0.75rem; color: #555577; margin-top: 0.5rem; }
    .upload-zone input { display: none; }

    #loading-indicator {
      display: none; margin-top: 2rem;
      font-size: 0.9rem; color: #a78bfa; letter-spacing: 0.1em;
    }
    #loading-indicator.active { display: block; }

    /* ── Level Selector ── */
    .level-divider {
      display: flex; align-items: center; gap: 1.2rem;
      margin: 2.5rem 0 1.8rem; width: 420px;
    }
    .level-divider::before, .level-divider::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(167, 139, 250, 0.2), transparent);
    }
    .level-divider span {
      font-size: 0.8rem; color: #6666aa; letter-spacing: 0.15em; text-transform: uppercase;
      white-space: nowrap;
    }

    .level-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.2rem 1.6rem;
      width: 420px;
    }

    .level-card {
      display: flex; flex-direction: column; align-items: center;
      cursor: pointer; position: relative;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .level-card:hover { transform: translateY(-4px); }

    .level-orb {
      width: 54px; height: 54px; border-radius: 50%;
      position: relative;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), inset 0 -3px 6px rgba(0,0,0,0.4);
      transition: box-shadow 0.3s ease;
    }
    .level-card:hover .level-orb {
      box-shadow: 0 0 20px var(--glow), 0 0 0 1px rgba(255,255,255,0.12),
                  inset 0 -3px 6px rgba(0,0,0,0.3);
    }

    /* Saturn ring */
    .level-orb.has-ring::after {
      content: '';
      position: absolute; top: 50%; left: 50%;
      width: 76px; height: 18px;
      transform: translate(-50%, -50%) rotate(-15deg);
      border: 1.5px solid rgba(210, 190, 120, 0.35);
      border-radius: 50%;
      pointer-events: none;
      transition: border-color 0.3s ease;
    }
    .level-card:hover .level-orb.has-ring::after {
      border-color: rgba(210, 190, 120, 0.6);
    }

    .level-name {
      font-size: 0.7rem; color: #8888bb; letter-spacing: 0.08em;
      margin-top: 0.5rem; transition: color 0.3s ease;
    }
    .level-card:hover .level-name { color: #c4b5fd; }

    .level-diff {
      display: flex; gap: 2px; margin-top: 0.3rem;
    }
    .level-diff .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: rgba(167, 139, 250, 0.15);
      transition: background 0.3s ease;
    }
    .level-diff .dot.filled { background: rgba(167, 139, 250, 0.55); }
    .level-card:hover .level-diff .dot.filled { background: rgba(167, 139, 250, 0.85); }

    /* Tooltip */
    .level-tooltip {
      position: absolute; bottom: calc(100% + 10px); left: 50%;
      transform: translateX(-50%) translateY(6px);
      background: rgba(15, 15, 30, 0.95);
      border: 1px solid rgba(167, 139, 250, 0.2);
      border-radius: 8px; padding: 0.5rem 0.8rem;
      white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
      backdrop-filter: blur(8px);
      z-index: 10;
    }
    .level-card:hover .level-tooltip {
      opacity: 1; transform: translateX(-50%) translateY(0);
    }
    .level-tooltip .tt-name {
      font-size: 0.75rem; color: #e0e0ff; font-weight: 500; letter-spacing: 0.05em;
    }
    .level-tooltip .tt-sub {
      font-size: 0.65rem; color: #7777aa; font-style: italic; margin-top: 0.15rem;
    }

    /* Game Over Overlay */
    #game-over-screen {
      position: absolute; inset: 0; z-index: 200;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(5, 5, 15, 0.92);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0ff;
      backdrop-filter: blur(8px);
    }
    #game-over-screen.active { display: flex; }

    #game-over-screen h2 {
      font-size: 3rem; font-weight: 200; letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
    }
    #game-over-screen .stats {
      font-size: 1rem; color: #8888bb; margin-bottom: 2.5rem; letter-spacing: 0.05em;
    }

    .btn-group { display: flex; gap: 1rem; }
    .btn {
      padding: 0.8rem 2rem; border: 1px solid rgba(167, 139, 250, 0.4);
      border-radius: 8px; background: rgba(167, 139, 250, 0.08);
      color: #c4b5fd; font-size: 0.95rem; cursor: pointer; letter-spacing: 0.05em;
      transition: all 0.3s ease; font-family: inherit;
    }
    .btn:hover {
      background: rgba(167, 139, 250, 0.2); border-color: #a78bfa;
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.15);
    }
    .btn.primary { background: rgba(167, 139, 250, 0.15); border-color: #a78bfa; }

    /* Victory Overlay */
    #victory-screen {
      position: absolute; inset: 0; z-index: 200;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(5, 5, 15, 0.88);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0ff;
      backdrop-filter: blur(8px);
    }
    #victory-screen.active { display: flex; }
    #victory-screen h2 {
      font-size: 3rem; font-weight: 200; letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fbbf24, #f472b6, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    #victory-screen .stats {
      font-size: 1rem; color: #8888bb; margin-bottom: 2.5rem; letter-spacing: 0.05em;
    }

    /* HUD */
    #hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 50;
      padding: 14px 24px;
      display: none; justify-content: space-between; align-items: flex-start;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #c4b5fd;
      pointer-events: none;
    }
    #hud.active { display: flex; }

    #hud .hud-left { display: flex; flex-direction: column; gap: 8px; }

    /* Lives row */
    #hud .hud-row { display: flex; align-items: center; gap: 8px; }
    #hud .hud-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: #8888bb; min-width: 46px;
    }
    #hud .hud-icons { display: flex; gap: 6px; }

    #hud .life {
      width: 16px; height: 16px; border-radius: 50%;
      background: #f472b6; box-shadow: 0 0 10px rgba(244, 114, 182, 0.5);
      transition: all 0.3s ease;
    }
    #hud .life.lost {
      background: rgba(244, 114, 182, 0.12);
      box-shadow: none;
      border: 1px solid rgba(244, 114, 182, 0.2);
    }

    /* Bomb charges */
    #hud .bomb-charge {
      width: 16px; height: 16px; border-radius: 3px;
      background: #60a5fa; box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
      transition: all 0.3s ease;
    }
    #hud .bomb-charge.used {
      background: rgba(96, 165, 250, 0.12);
      box-shadow: none;
      border: 1px solid rgba(96, 165, 250, 0.2);
    }

    #hud .score { font-size: 0.9rem; letter-spacing: 0.1em; }
    #hud .song-title { font-size: 0.75rem; color: #6666aa; letter-spacing: 0.05em; }

    /* Score popups */
    #score-popups {
      position: absolute; inset: 0; z-index: 60;
      pointer-events: none; overflow: hidden;
    }
    .score-popup {
      position: absolute;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      pointer-events: none;
      animation: scoreFloat 0.8s ease-out forwards;
      text-shadow: 0 0 6px currentColor;
    }
    .score-popup.eye-hit {
      font-size: 1rem;
      color: #fbbf24;
    }
    .score-popup.body-hit {
      font-size: 0.75rem;
      color: #94a3b8;
    }
    /* Milestone reward notification */
    .milestone-notify {
      position: absolute; top: 60px; left: 50%; z-index: 55;
      transform: translateX(-50%) translateY(-10px);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 1.1rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 22px; border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transition: none;
    }
    .milestone-notify.active { opacity: 0; }
    .milestone-notify.animate {
      animation: milestoneIn 2.2s ease-out forwards;
    }
    .milestone-notify.life-reward {
      color: #f472b6;
      text-shadow: 0 0 12px rgba(244, 114, 182, 0.6);
      border: 1px solid rgba(244, 114, 182, 0.3);
      background: rgba(244, 114, 182, 0.08);
    }
    .milestone-notify.bomb-reward {
      color: #60a5fa;
      text-shadow: 0 0 12px rgba(96, 165, 250, 0.6);
      border: 1px solid rgba(96, 165, 250, 0.3);
      background: rgba(96, 165, 250, 0.08);
    }
    @keyframes milestoneIn {
      0%   { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.8); }
      10%  { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.1); }
      20%  { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.0); }
      80%  { opacity: 1; transform: translateX(-50%) translateY(0) scale(1.0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(-6px) scale(0.95); }
    }

    @keyframes scoreFloat {
      0%   { opacity: 1; transform: translateY(0) scale(1.2); }
      30%  { opacity: 1; transform: translateY(-12px) scale(1); }
      100% { opacity: 0; transform: translateY(-35px) scale(0.85); }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Upload Screen -->
    <div id="upload-screen">
      <h1>MIDI Symphony</h1>
      <p class="subtitle">bullet hell, composed by you</p>
      <div class="upload-zone" id="upload-zone">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <p>Drop your MIDI file here</p>
        <span class="format">.mid / .midi</span>
        <input type="file" id="midi-input" accept=".mid,.midi" />
      </div>
      <div class="level-divider"><span>or explore the cosmos</span></div>

      <div class="level-grid" id="level-grid"></div>

      <div id="loading-indicator">Preparing your symphony...</div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div class="hud-left">
        <div class="hud-row">
          <span class="hud-label">Life</span>
          <div class="hud-icons" id="lives"></div>
        </div>
        <div class="hud-row">
          <span class="hud-label">Bomb</span>
          <div class="hud-icons" id="bombs"></div>
        </div>
      </div>
      <div class="song-title" id="song-title"></div>
      <div class="score" id="score">Score: 0</div>
    </div>

    <!-- Score popups container -->
    <div id="score-popups"></div>

    <!-- Milestone reward notification -->
    <div id="milestone-notify" class="milestone-notify"></div>

    <!-- Game Over Screen -->
    <div id="game-over-screen">
      <h2>GAME OVER</h2>
      <p class="stats" id="game-over-stats"></p>
      <div class="btn-group">
        <button class="btn primary" id="btn-retry">Play Again</button>
        <button class="btn" id="btn-new-song">New Song</button>
      </div>
    </div>

    <!-- Victory Screen -->
    <div id="victory-screen">
      <h2>MAGNIFICENT</h2>
      <p class="stats" id="victory-stats"></p>
      <div class="btn-group">
        <button class="btn primary" id="btn-replay">Play Again</button>
        <button class="btn" id="btn-new-song-v">New Song</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
