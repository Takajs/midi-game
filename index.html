<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MIDI Bullet Symphony</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a12; }
    #app { width: 100%; height: 100%; position: relative; }

    /* Upload Screen */
    #upload-screen {
      position: absolute; inset: 0; z-index: 100;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 30%, #1a1a3e 0%, #0a0a12 70%);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0ff;
      transition: opacity 0.8s ease;
    }
    #upload-screen.hidden { opacity: 0; pointer-events: none; }

    #upload-screen h1 {
      font-size: 3.5rem; font-weight: 200; letter-spacing: 0.3em; text-transform: uppercase;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa, #f472b6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite alternate;
    }
    @keyframes shimmer {
      0% { filter: brightness(0.8); } 100% { filter: brightness(1.3); }
    }

    #upload-screen .subtitle {
      font-size: 1rem; font-weight: 300; letter-spacing: 0.15em; color: #8888bb;
      margin-bottom: 3rem;
    }

    .upload-zone {
      width: 420px; height: 220px;
      border: 2px dashed rgba(167, 139, 250, 0.3);
      border-radius: 16px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(167, 139, 250, 0.03);
      position: relative;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: rgba(167, 139, 250, 0.7);
      background: rgba(167, 139, 250, 0.08);
      box-shadow: 0 0 40px rgba(167, 139, 250, 0.1);
    }
    .upload-zone svg { width: 48px; height: 48px; stroke: #a78bfa; margin-bottom: 1rem; opacity: 0.7; }
    .upload-zone p { font-size: 0.95rem; color: #8888bb; }
    .upload-zone .format { font-size: 0.75rem; color: #555577; margin-top: 0.5rem; }
    .upload-zone input { display: none; }

    #loading-indicator {
      display: none; margin-top: 2rem;
      font-size: 0.9rem; color: #a78bfa; letter-spacing: 0.1em;
    }
    #loading-indicator.active { display: block; }

    /* Game Over Overlay */
    #game-over-screen {
      position: absolute; inset: 0; z-index: 200;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(5, 5, 15, 0.92);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0ff;
      backdrop-filter: blur(8px);
    }
    #game-over-screen.active { display: flex; }

    #game-over-screen h2 {
      font-size: 3rem; font-weight: 200; letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
    }
    #game-over-screen .stats {
      font-size: 1rem; color: #8888bb; margin-bottom: 2.5rem; letter-spacing: 0.05em;
    }

    .btn-group { display: flex; gap: 1rem; }
    .btn {
      padding: 0.8rem 2rem; border: 1px solid rgba(167, 139, 250, 0.4);
      border-radius: 8px; background: rgba(167, 139, 250, 0.08);
      color: #c4b5fd; font-size: 0.95rem; cursor: pointer; letter-spacing: 0.05em;
      transition: all 0.3s ease; font-family: inherit;
    }
    .btn:hover {
      background: rgba(167, 139, 250, 0.2); border-color: #a78bfa;
      box-shadow: 0 0 20px rgba(167, 139, 250, 0.15);
    }
    .btn.primary { background: rgba(167, 139, 250, 0.15); border-color: #a78bfa; }

    /* Victory Overlay */
    #victory-screen {
      position: absolute; inset: 0; z-index: 200;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(5, 5, 15, 0.88);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      color: #e0e0ff;
      backdrop-filter: blur(8px);
    }
    #victory-screen.active { display: flex; }
    #victory-screen h2 {
      font-size: 3rem; font-weight: 200; letter-spacing: 0.2em;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #fbbf24, #f472b6, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    #victory-screen .stats {
      font-size: 1rem; color: #8888bb; margin-bottom: 2.5rem; letter-spacing: 0.05em;
    }

    /* HUD */
    #hud {
      position: absolute; top: 0; left: 0; right: 0; z-index: 50;
      padding: 12px 20px;
      display: none; justify-content: space-between; align-items: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #c4b5fd;
      pointer-events: none;
    }
    #hud.active { display: flex; }
    #hud .lives { display: flex; gap: 6px; }
    #hud .life {
      width: 12px; height: 12px; border-radius: 50%;
      background: #f472b6; box-shadow: 0 0 8px rgba(244, 114, 182, 0.5);
      transition: all 0.3s ease;
    }
    #hud .life.lost { background: #333; box-shadow: none; }
    #hud .score { font-size: 0.85rem; letter-spacing: 0.1em; }
    #hud .song-title { font-size: 0.75rem; color: #6666aa; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Upload Screen -->
    <div id="upload-screen">
      <h1>MIDI Symphony</h1>
      <p class="subtitle">bullet hell, composed by you</p>
      <div class="upload-zone" id="upload-zone">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
        </svg>
        <p>Drop your MIDI file here</p>
        <span class="format">.mid / .midi</span>
        <input type="file" id="midi-input" accept=".mid,.midi" />
      </div>
      <div id="loading-indicator">Preparing your symphony...</div>
    </div>

    <!-- HUD -->
    <div id="hud">
      <div>
        <div class="lives" id="lives"></div>
      </div>
      <div class="song-title" id="song-title"></div>
      <div class="score" id="score">Score: 0</div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen">
      <h2>GAME OVER</h2>
      <p class="stats" id="game-over-stats"></p>
      <div class="btn-group">
        <button class="btn primary" id="btn-retry">Play Again</button>
        <button class="btn" id="btn-new-song">New Song</button>
      </div>
    </div>

    <!-- Victory Screen -->
    <div id="victory-screen">
      <h2>MAGNIFICENT</h2>
      <p class="stats" id="victory-stats"></p>
      <div class="btn-group">
        <button class="btn primary" id="btn-replay">Play Again</button>
        <button class="btn" id="btn-new-song-v">New Song</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
